name: Deploy FE to Vercel
on:
  push:
    branches:
      - main
    paths:
      - "FE/**"
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FE
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Inject build env
        run: |
          sed -i '/^VITE_API_BASE_URL=/d' .vercel/.env.production.local
          echo 'VITE_API_BASE_URL="https://pickd.ai.kr"' >> .vercel/.env.production.local
          echo "== pulled env keys =="
          cut -d= -f1 .vercel/.env.production.local

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Verify env baked into bundle
        run: |
          if grep -rq "pickd.ai.kr" .vercel/output/static/assets/; then
            echo "✅ VITE_API_BASE_URL baked into bundle"
          else
            echo "❌ VITE_API_BASE_URL missing from bundle"
            exit 1
          fi

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
