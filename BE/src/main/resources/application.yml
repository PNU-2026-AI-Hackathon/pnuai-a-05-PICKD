spring:
  application:
    name: pickd

  profiles:
    active: local

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "CLIENT_ID.apps.googleusercontent.com"
            client-secret: "CLIENT_SECRET"
            scope:
              - profile
              - email
              - https://www.googleapis.com/auth/calendar
              - https://www.googleapis.com/auth/drive.file
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

  main:
    allow-bean-definition-overriding: true

  # AWS 및 S3 설정
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:dummy-access-key}
        secret-key: ${AWS_SECRET_ACCESS_KEY:dummy-secret-key}
      region:
        static: ap-northeast-2
      s3:
        bucket: ${AWS_S3_BUCKET:pickd-file-bucket}

server:
  port: 8080

  servlet:
    session:
      cookie:
        same-site: lax

gemini:
  api:
    key: ${gemini.api.key}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent

ai-server:
  url: http://localhost:8000

# CloudFront CDN 도메인 설정 (유저 다운로드 초고속용)
aws:
  cloudfront:
    domain: ${AWS_CLOUDFRONT_DOMAIN:https://cdn.pickd.co.kr}

# Admin 대시보드 Basic Auth (실제 값은 application-local.yml 또는 환경변수로 주입)
admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:}


